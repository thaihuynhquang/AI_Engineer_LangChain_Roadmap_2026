<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Engineer LangChain Roadmap 2026 - Tracker</title>
  <meta name="description" content="Lộ trình tự học và theo dõi tiến độ xây dựng ứng dụng AI Engineer Enterprise Knowledge Assistant 2026" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/styles/main.css" />
</head>
<body>
  <!-- Header Bar -->
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-icon" title="AI Assistant Logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9L12 2Z" fill="currentColor" fill-opacity="0.25"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">AI Engineer Roadmap 2026</div>
        <div class="brand-subtitle">Enterprise Knowledge AI Assistant</div>
      </div>
    </div>

    <div class="header-actions">
      <button class="action-btn" id="btn-export" title="Xuất file JSON sao lưu tiến độ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="btn-label">Export</span>
      </button>
      <button class="action-btn" id="btn-import" title="Nhập file JSON khôi phục tiến độ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span class="btn-label">Import</span>
      </button>
      <button class="action-btn action-btn-danger" id="btn-reset" title="Đặt lại toàn bộ tiến độ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span class="btn-label">Reset</span>
      </button>
      <button class="theme-toggle-btn" id="btn-theme" title="Chuyển đổi giao diện Sáng/Tối" aria-label="Toggle Theme">
        <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Navigation Tab Bar -->
  <nav class="nav-tabs-container" aria-label="Main Navigation">
    <div class="nav-tabs" role="tablist">
      <button class="nav-tab active" data-tab="dashboard" role="tab" aria-selected="true" id="tab-dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        <span>Dashboard</span>
        <span class="tab-badge" id="badge-overall-pct">0%</span>
      </button>
      <button class="nav-tab" data-tab="roadmap" role="tab" aria-selected="false" id="tab-roadmap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
        <span>Roadmap Sprints</span>
      </button>
      <button class="nav-tab" data-tab="schedule" role="tab" aria-selected="false" id="tab-schedule">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Pomodoro Schedule</span>
      </button>
      <button class="nav-tab" data-tab="resources" role="tab" aria-selected="false" id="tab-resources">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        <span>Free Resources</span>
      </button>
      <button class="nav-tab" data-tab="techstack" role="tab" aria-selected="false" id="tab-techstack">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 2 7 12 12 22 7 12 2"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
        <span>Tech Stack</span>
      </button>
    </div>
  </nav>

  <!-- Main View Containers -->
  <main class="app-main">
    <section class="view-container active" data-view="dashboard" id="view-dashboard">
      <roadmap-view-dashboard></roadmap-view-dashboard>
    </section>

    <section class="view-container" data-view="roadmap" id="view-roadmap">
      <roadmap-view-roadmap></roadmap-view-roadmap>
    </section>

    <section class="view-container" data-view="schedule" id="view-schedule">
      <roadmap-view-schedule></roadmap-view-schedule>
    </section>

    <section class="view-container" data-view="resources" id="view-resources">
      <roadmap-view-resources></roadmap-view-resources>
    </section>

    <section class="view-container" data-view="techstack" id="view-techstack">
      <roadmap-view-techstack></roadmap-view-techstack>
    </section>
  </main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Main Bootstrap Entry Script -->
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
